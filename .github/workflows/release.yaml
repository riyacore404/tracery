name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: goreleaser
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install BPF build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang-14 llvm-14 \
            libbpf-dev \
            libelf-dev \
            linux-headers-$(uname -r) \
            linux-tools-common || true
          sudo apt-get install -y linux-tools-$(uname -r) || true
          sudo update-alternatives \
            --install /usr/bin/clang clang /usr/bin/clang-14 100

      - name: Generate vmlinux.h
        run: |
          if command -v bpftool &>/dev/null && [ -f /sys/kernel/btf/vmlinux ]; then
            bpftool btf dump file /sys/kernel/btf/vmlinux format c > bpf/vmlinux.h
            echo "Generated fresh vmlinux.h"
          else
            echo "Using pre-generated vmlinux.h from repo"
          fi

      - name: Build BPF objects
        run: make bpf CLANG=clang-14

      - name: Run tests
        run: go test ./...

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "v2.16.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}