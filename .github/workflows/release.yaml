name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install BPF build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang-14 llvm-14 \
            libbpf-dev \
            libelf-dev \
            linux-headers-$(uname -r) \
            linux-tools-common \
            linux-tools-$(uname -r) || true
          sudo update-alternatives \
            --install /usr/bin/clang clang /usr/bin/clang-14 100

      - name: Generate vmlinux.h
        run: |
          if [ -f /sys/kernel/btf/vmlinux ]; then
            bpftool btf dump file /sys/kernel/btf/vmlinux format c > bpf/vmlinux.h
          else
            echo "BTF not available — using pre-generated vmlinux.h"
          fi

      - name: Build BPF objects
        run: make bpf CLANG=clang-14

      - name: Run tests
        run: go test ./...

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}