name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run tests
        run: go test ./...

      - name: Run lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --exclude-dirs mini

  bpf-build:
    name: BPF compile (kernel ${{ matrix.kernel }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        kernel: ["5.15", "6.1"]
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang-16 llvm-16 libbpf-dev linux-headers-$(uname -r)
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-16 100

      - name: Generate vmlinux.h
        run: |
          sudo apt-get install -y linux-tools-$(uname -r) || true
          bpftool btf dump file /sys/kernel/btf/vmlinux format c > bpf/vmlinux.h

      - name: Build BPF objects
        run: make bpf

      - name: Build Go binary
        run: make build
