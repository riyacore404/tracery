name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run tests
        run: go test ./...

      - name: Run lint
        uses: golangci/golangci-lint-action@v7
        with:
          args: --no-config --enable=errcheck,govet,staticcheck

  bpf-build:
    name: BPF compile
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang-14 llvm-14 \
            libbpf-dev \
            libelf-dev \
            linux-headers-$(uname -r) \
            linux-tools-common \
            linux-tools-$(uname -r) || true
          sudo update-alternatives \
            --install /usr/bin/clang clang /usr/bin/clang-14 100
          echo "CLANG=clang-14" >> $GITHUB_ENV

      - name: Generate vmlinux.h
        run: |
          if [ -f /sys/kernel/btf/vmlinux ]; then
            bpftool btf dump file /sys/kernel/btf/vmlinux format c > bpf/vmlinux.h
          else
            echo "BTF not available — using pre-generated vmlinux.h"
          fi

      - name: Build BPF objects
        run: make bpf CLANG=${CLANG:-clang-14}

      - name: Build Go binary
        run: make build